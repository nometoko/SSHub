ignore:
  - "Sources/AddHostSheet.swift"
  - "Sources/ContentView.swift"
  - "Sources/DashboardView.swift"
  - "Sources/HeroView.swift"
  - "Sources/HostListView.swift"
  - "Sources/HostsScreen.swift"
  - "Sources/JobDashboardView.swift"
  - "Sources/JobsScreen.swift"
  - "Sources/SettingsView.swift"
  - "Sources/SidebarView.swift"
  - "Sources/SSHubApp.swift"
  - "Sources/UIComponents.swift"

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: 80%
        threshold: 0%

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true
  require_base: true
  require_head: true
