name: macOS Swift CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  lint:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: swiftlint lint --strict --reporter github-actions-logging

  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

  coverage:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Swift version
        run: swift --version

      - name: Test with coverage
        run: swift test --enable-code-coverage

      - name: Generate coverage report
        shell: bash
        run: |
          set -euo pipefail

          PROF_DATA=$(find .build -name default.profdata | head -n 1)
          TEST_BINARY=$(find .build -path "*SSHubPackageTests.xctest/Contents/MacOS/SSHubPackageTests" | head -n 1)

          if [[ -z "${PROF_DATA}" || -z "${TEST_BINARY}" ]]; then
            echo "Coverage artifacts not found"
            find .build -maxdepth 5 -type f | sort
            exit 1
          fi

          mkdir -p coverage

          xcrun llvm-cov report \
            "${TEST_BINARY}" \
            -instr-profile "${PROF_DATA}" \
            > coverage/coverage-report.txt

          xcrun llvm-cov export \
            "${TEST_BINARY}" \
            -instr-profile "${PROF_DATA}" \
            -format="lcov" \
            > coverage/lcov.info

          {
            echo "## Full Coverage"
            echo
            echo '```text'
            cat coverage/coverage-report.txt
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          fail_ci_if_error: true
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
