name: macOS Swift CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  lint:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: swiftlint lint --strict --reporter github-actions-logging

  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

  coverage:
    runs-on: macos-latest
    env:
      COVERAGE_THRESHOLD: "80.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Swift version
        run: swift --version

      - name: Install diff-cover
        run: python3 -m pip install --user diff-cover

      - name: Test with coverage
        run: swift test --enable-code-coverage

      - name: Generate coverage report
        shell: bash
        run: |
          set -euo pipefail

          PROF_DATA=$(find .build -name default.profdata | head -n 1)
          TEST_BINARY=$(find .build -path "*SSHubPackageTests.xctest/Contents/MacOS/SSHubPackageTests" | head -n 1)

          if [[ -z "${PROF_DATA}" || -z "${TEST_BINARY}" ]]; then
            echo "Coverage artifacts not found"
            find .build -maxdepth 5 -type f | sort
            exit 1
          fi

          mkdir -p coverage

          xcrun llvm-cov report \
            "${TEST_BINARY}" \
            -instr-profile "${PROF_DATA}" \
            > coverage/coverage-report.txt

          xcrun llvm-cov export \
            "${TEST_BINARY}" \
            -instr-profile "${PROF_DATA}" \
            -format="lcov" \
            > coverage/lcov.info

          {
            echo "## Full Coverage"
            echo
            echo '```text'
            cat coverage/coverage-report.txt
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Enforce diff coverage threshold
        shell: bash
        run: |
          set -euo pipefail

          BASE_REF="${GITHUB_BASE_REF:-${{ github.event.repository.default_branch }}}"
          git fetch origin "${BASE_REF}" --depth=1

          python3 -m diff_cover.diff_cover_tool coverage/lcov.info \
            --compare-branch "origin/${BASE_REF}" \
            --fail-under "${COVERAGE_THRESHOLD}" \
            --format markdown:coverage/diff-coverage.md \
            --format html:coverage/diff-coverage.html \
            > coverage/diff-coverage.txt

          DIFF_COVERAGE_VALUE=$(grep -Eo 'Coverage:\s+[0-9]+(\.[0-9]+)?%' coverage/diff-coverage.txt | head -n 1 | sed -E 's/Coverage:\s+([0-9]+(\.[0-9]+)?)%/\1/')

          if [[ -z "${DIFF_COVERAGE_VALUE}" ]]; then
            echo "Diff coverage value not found"
            cat coverage/diff-coverage.txt
            exit 1
          fi

          {
            echo
            echo "## Diff Coverage"
            echo
            echo "Threshold: ${COVERAGE_THRESHOLD}%"
            echo "Measured diff coverage: ${DIFF_COVERAGE_VALUE}%"
            echo
            cat coverage/diff-coverage.md
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
