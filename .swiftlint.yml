included:
  - Sources
  - Tests

excluded:
  - .build

opt_in_rules:
  - empty_count
  - explicit_init
  - first_where
  - flatmap_over_map_reduce
  - redundant_nil_coalescing
  - sorted_first_last

disabled_rules:
  - todo

line_length:
  warning: 140
  error: 180

file_length:
  warning: 500
  error: 800

function_body_length:
  warning: 80
  error: 120

type_body_length:
  warning: 300
  error: 400

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - x
    - y

reporter: "xcode"
